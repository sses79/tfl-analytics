<div class="shell">
  <header class="masthead">
    <a class="brand" routerLink="/" aria-label="TfL Analytics home">
      <span class="roundel" aria-hidden="true"><span></span></span>
      <span>
        <strong>TfL Analytics</strong>
        <small>London network pulse</small>
      </span>
    </a>

    <div class="header-status">
      <div class="api-state" [class.api-state--online]="apiOnline()">
        <span aria-hidden="true"></span>
        API {{ apiOnline() ? 'online' : 'checking' }}
      </div>
      <div class="api-state" [class.api-state--online]="signalRConnected()">
        <span aria-hidden="true"></span>
        Live {{ signalRConnected() ? 'on' : 'off' }}
      </div>
    </div>
  </header>

  <nav class="mainnav" aria-label="Primary navigation">
    <a routerLink="/dashboard" routerLinkActive="mainnav__link--active" class="mainnav__link">Dashboard</a>
    <a routerLink="/status" routerLinkActive="mainnav__link--active" class="mainnav__link">Line status</a>
    <a routerLink="/arrivals" routerLinkActive="mainnav__link--active" class="mainnav__link">Arrivals</a>
    <a routerLink="/alerts" routerLinkActive="mainnav__link--active" class="mainnav__link">Alerts</a>
  </nav>

  <main>
    <router-outlet />
  </main>

  <footer>
    <span>Portfolio analytics project</span>
    <span>Data supplied by Transport for London</span>
  </footer>
</div>
