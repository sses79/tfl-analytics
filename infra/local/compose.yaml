name: tfl-analytics

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command:
      azurite --location /data --blobHost 0.0.0.0 --queueHost 0.0.0.0
      --tableHost 0.0.0.0 --skipApiVersionCheck
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    networks:
      - tfl-analytics

  eventhubs-emulator:
    image: mcr.microsoft.com/azure-messaging/eventhubs-emulator:latest
    environment:
      ACCEPT_EULA: "Y"
      BLOB_SERVER: azurite
      METADATA_SERVER: azurite
    volumes:
      - ./eventhubs-config.json:/Eventhubs_Emulator/ConfigFiles/Config.json:ro
    ports:
      - "5672:5672"
      - "9092:9092"
      - "5300:5300"
    depends_on:
      - azurite
    networks:
      - tfl-analytics

  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-latest
    command:
      ["--protocol", "https-insecure", "--gateway-endpoint", "cosmos"]
    ports:
      - "8081:8081"
      - "8082:8080"
      - "1234:1234"
    volumes:
      - cosmos-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - tfl-analytics

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      HOME: /var/opt/mssql
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}
    working_dir: /var/opt/mssql
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    networks:
      - tfl-analytics

  wiremock:
    image: wiremock/wiremock:3.13.1
    command: ["--global-response-templating", "--verbose"]
    ports:
      - "8089:8080"
    volumes:
      - ./wiremock:/home/wiremock:ro
    networks:
      - tfl-analytics

  api:
    build:
      context: ../..
      dockerfile: src/TflAnalytics.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      TflApi__BaseUrl: http://wiremock:8080/
      TflApi__AppKey: ""
      DD_AGENT_HOST: datadog-agent
      DD_ENV: local
      DD_SERVICE: tfl-analytics-api
      DD_VERSION: dev
    ports:
      - "8080:8080"
    depends_on:
      - wiremock
    networks:
      - tfl-analytics

  web:
    profiles: ["ui"]
    build:
      context: ../..
      dockerfile: web/tfl-analytics-dashboard/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - tfl-analytics

  ingestion-functions:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: src/TflAnalytics.Ingestion.Functions/Dockerfile
    environment:
      AzureWebJobsStorage: ${AZURITE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;}
      AzureFunctionsJobHost__Logging__Console__IsEnabled: "true"
      FUNCTIONS_WORKER_RUNTIME: dotnet-isolated
      TflApi__BaseUrl: http://wiremock:8080/
      TflApi__AppKey: ""
      EventHubs__ConnectionString: Endpoint=sb://eventhubs-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      EventHubs__EventHubName: tfl-events
      IngestionArrivalsSchedule: "*/30 * * * * *"
      IngestionLineStatusSchedule: "0 */2 * * * *"
      Ingestion__StationIds__0: 940GZZLUVIC
      Ingestion__StationIds__1: 940GZZLUOXC
      Ingestion__StationIds__2: 940GZZLUGPK
      Ingestion__StationIds__3: 940GZZLUKSX
      Ingestion__StationIds__4: 940GZZLULNB
      Ingestion__LineIds__0: bakerloo
      Ingestion__LineIds__1: central
      Ingestion__LineIds__2: circle
      Ingestion__LineIds__3: district
      Ingestion__LineIds__4: hammersmith-city
      Ingestion__LineIds__5: jubilee
      Ingestion__LineIds__6: metropolitan
      Ingestion__LineIds__7: northern
      Ingestion__LineIds__8: piccadilly
      Ingestion__LineIds__9: victoria
      DD_AGENT_HOST: datadog-agent
      DD_ENV: local
      DD_SERVICE: tfl-analytics-ingestion
      DD_VERSION: dev
    depends_on:
      - azurite
      - eventhubs-emulator
      - wiremock
    networks:
      - tfl-analytics

  processing-functions:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: src/TflAnalytics.Processing.Functions/Dockerfile
    environment:
      AzureWebJobsStorage: ${AZURITE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;}
      AzureFunctionsJobHost__Logging__Console__IsEnabled: "true"
      FUNCTIONS_WORKER_RUNTIME: dotnet-isolated
      WEBSITE_HOSTNAME: processing-functions
      EventHubs: Endpoint=sb://eventhubs-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      ProcessingEventHubName: tfl-events
      ProcessingConsumerGroup: processing
      ProcessingQueueName: processing
      ProcessingStorage__ConnectionString: ${AZURITE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;}
      ProcessingStorage__RawContainerName: raw
      ProcessingStorage__QueueName: processing
      ProcessingStorage__AuditTableName: audit
      ProcessingStorage__Initialize: "true"
      Cosmos__ConnectionString: AccountEndpoint=https://cosmos:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==;
      Cosmos__DatabaseName: tfl-analytics
      Cosmos__LiveEventsContainerName: live-events
      Cosmos__LineStatusContainerName: line-status
      Cosmos__Initialize: "true"
      Cosmos__DisableServerCertificateValidation: "true"
      AlertStorage__ConnectionString: Server=sql,1433;User Id=sa;Password=${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env};Encrypt=True;TrustServerCertificate=True
      AlertStorage__DatabaseName: tfl-analytics
      AlertStorage__Initialize: "true"
      Alerts__ArrivalSlippageThresholdSeconds: "120"
      Alerts__GoodServiceSeverity: "10"
      DD_AGENT_HOST: datadog-agent
      DD_ENV: local
      DD_SERVICE: tfl-analytics-processing
      DD_VERSION: dev
    depends_on:
      azurite:
        condition: service_started
      eventhubs-emulator:
        condition: service_started
      cosmos:
        condition: service_healthy
      sql:
        condition: service_started
    networks:
      - tfl-analytics

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    profiles: ["observability"]
    environment:
      DD_API_KEY: ${DD_API_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.eu}
      DD_ENV: local
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
    ports:
      - "8125:8125/udp"
      - "8126:8126"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    networks:
      - tfl-analytics

networks:
  tfl-analytics:

volumes:
  azurite-data:
  cosmos-data:
  sql-data:
