name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Git history for secrets
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/repo:ro" \
            zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            git /repo \
            --config /repo/.gitleaks.toml \
            --redact \
            --no-banner

  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/tfl-analytics-dashboard/package-lock.json

      - name: Use repository npm version
        run: npm install --global npm@11.6.2

      - name: Audit NuGet dependencies
        run: dotnet list TflAnalytics.sln package --vulnerable --include-transitive

      - name: Install Angular dependencies
        working-directory: web/tfl-analytics-dashboard
        run: npm ci

      - name: Audit production npm dependencies
        working-directory: web/tfl-analytics-dashboard
        run: npm audit --omit=dev
